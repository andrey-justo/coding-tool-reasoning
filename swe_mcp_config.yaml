taxonomy:
  # Optional overrides for where to load taxonomies from. Paths can be
  # absolute or relative to the repository root.
  ground_data_dir: "taxonomies/ground_data"
  linked_data_dir: "taxonomies/linked_data"
  # How deep to traverse relationships when building summaries (1 = direct).
  relationship_depth: 1

planning:
  # Max number of high-level steps that Stage 1 planning will keep.
  max_steps: 8
  # Default NFR focus if none is explicitly provided or inferred.
  default_nfr_focus:
    - Maintainability
    - Readability

judging:
  # 0.0 = very lenient, 1.0 = very strict. Used as guidance in prompts.
  strictness: 0.5
  # Maximum number of risk bullet points in explanations.
  max_risks: 5

workflow:
  # Ordered software engineering workflow stages for the overall pipeline.
  stages:
    - requirements
    - planning
    - implementation
    - testing
    - documentation
    - deployment
    - monitoring
    - diagnosis
  # Whether to treat the workflow as a continuous improvement cycle.
  cycle_enabled: true
